<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Predicción California Housing</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 6px; }
    button { margin-top: 15px; padding: 10px 20px; }
    #resultado { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Predicción de Precio (California Housing)</h2>
  <form id="form">
    <label>MedInc <input type="number" step="any" name="MedInc" value="8.3" required></label>
    <label>HouseAge <input type="number" step="any" name="HouseAge" value="41" required></label>
    <label>AveRooms <input type="number" step="any" name="AveRooms" value="6.98" required></label>
    <label>AveBedrms <input type="number" step="any" name="AveBedrms" value="1.02" required></label>
    <label>Population <input type="number" step="any" name="Population" value="322" required></label>
    <label>AveOccup <input type="number" step="any" name="AveOccup" value="2.55" required></label>
    <label>Latitude <input type="number" step="any" name="Latitude" value="37.88" required></label>
    <label>Longitude <input type="number" step="any" name="Longitude" value="-122.23" required></label>
    <button type="submit">Predecir</button>
  </form>
  <div id="resultado"></div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {};
      new FormData(e.target).forEach((v, k) => data[k] = parseFloat(v));

      const res = await fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      const json = await res.json();
      document.getElementById('resultado').textContent = res.ok
        ? `Predicción: ${json.prediction} (${json.unit})`
        : `Error: ${json.error}`;
    });
  </script>
</body>
</html>
